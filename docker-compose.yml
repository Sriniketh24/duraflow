version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: duraflow
      POSTGRES_PASSWORD: duraflow
      POSTGRES_DB: duraflow
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duraflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

  duraflow:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://duraflow:duraflow@postgres:5432/duraflow?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  pg_data:
